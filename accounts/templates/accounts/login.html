{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FieldCRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-wrapper {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(255,255,255,0.97);
            border-radius: 20px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .logo-box {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
        }
        .login-title {
            font-size: 24px;
            font-weight: 800;
            color: #1e1b4b;
            text-align: center;
            margin-bottom: 4px;
        }
        .login-sub {
            font-size: 13px;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 28px;
        }
        .form-label {
            font-weight: 600;
            font-size: 13px;
            color: #374151;
            margin-bottom: 5px;
        }
        .form-control {
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 11px 14px;
            font-size: 14px;
            transition: all 0.2s;
            background: #f8fafc;
        }
        .form-control:focus {
            border-color: #4f46e5;
            background: white;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }
        .btn-login {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #3730a3, #6d28d9);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(79,70,229,0.4);
            color: white;
        }
        .divider {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 20px 0;
        }
        .signup-link {
            text-align: center;
            font-size: 13px;
            color: #64748b;
        }
        .signup-link a {
            color: #4f46e5;
            font-weight: 600;
            text-decoration: none;
        }
        .signup-link a:hover {
            text-decoration: underline;
        }
        .alert {
            border-radius: 10px;
            border: none;
            font-size: 13px;
            padding: 10px 14px;
        }
        .particle {
            position: fixed;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            animation: float 6s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="particle" style="width:100px;height:100px;top:8%;left:8%;animation-delay:0s;"></div>
    <div class="particle" style="width:60px;height:60px;top:15%;right:12%;animation-delay:2s;"></div>
    <div class="particle" style="width:140px;height:140px;bottom:8%;left:15%;animation-delay:4s;"></div>
    <div class="particle" style="width:70px;height:70px;bottom:15%;right:8%;animation-delay:1s;"></div>

    <div class="login-wrapper">
        <div class="login-card">

            <div class="logo-box">
                <i class="bi bi-grid-fill text-white" style="font-size:22px;"></i>
            </div>
            <h1 class="login-title">FieldCRM</h1>
            <p class="login-sub">Sign in to your account</p>

            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-danger mb-3">
                    <i class="bi bi-exclamation-circle me-1"></i>{{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form method="post" action="{% url 'accounts:login' %}">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-person me-1"></i>Username
                    </label>
                    <input type="text" name="username" class="form-control"
                           placeholder="Enter your username" required autofocus>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-lock me-1"></i>Password
                    </label>
                    <input type="password" name="password" class="form-control"
                           placeholder="Enter your password" required>
                </div>

                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="remember_me" id="rememberMe">
                        <label class="form-check-label" for="rememberMe" style="font-size:13px;color:#64748b;">
                            Remember me
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-login">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>

            <hr class="divider">

            <p class="signup-link">
                New customer?
                <a href="{% url 'accounts:customer_signup' %}">Create an account</a>
            </p>

        </div>
    </div>
</body>
</html>
