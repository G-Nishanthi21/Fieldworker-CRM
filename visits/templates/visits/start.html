{% extends 'base.html' %}
{% block title %}Start Visit{% endblock %}
{% block page_title %}Start New Visit{% endblock %}
{% block page_subtitle %}Capture before photo{% endblock %}

{% block content %}
<div class="card" style="max-width:600px;margin:auto;">
    <div class="card-body p-4">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-600">Customer Name *</label>
                <input type="text" name="customer_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-600">Customer Phone</label>
                <input type="text" name="customer_phone" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label fw-600">Site Address</label>
                <input type="text" name="site_address" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label fw-600">Work Description</label>
                <textarea name="work_description" class="form-control" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-600">Before Photo *</label>
                <input type="file" name="before_photo" class="form-control" accept="image/*" capture="environment">
                <small class="text-muted">Take a photo of the site before starting work.</small>
            </div>

            <button type="submit" class="btn btn-success w-100">
                <i class="bi bi-play-circle"></i> Start Visit
            </button>
        </form>
    </div>
</div>
{% endblock %}
