<!DOCTYPE html>
<html>
<head>
    <title>Approve Work - FieldCRM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width:500px;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h4 class="fw-bold mb-1">Work Completed</h4>
            <p class="text-muted">{{ visit.worker.get_full_name|default:visit.worker.username }} has completed work at your site.</p>

            <div class="row g-2 mb-3">
                {% if visit.before_photo %}
                <div class="col-6">
                    <p class="fw-600 mb-1" style="font-size:13px;">BEFORE</p>
                    <img src="{{ visit.before_photo.url }}" class="img-fluid rounded">
                </div>
                {% endif %}
                {% if visit.after_photo %}
                <div class="col-6">
                    <p class="fw-600 mb-1" style="font-size:13px;">AFTER</p>
                    <img src="{{ visit.after_photo.url }}" class="img-fluid rounded">
                </div>
                {% endif %}
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Your Rating</label>
                    <select name="rating" class="form-select">
                        <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                        <option value="4">⭐⭐⭐⭐ Good</option>
                        <option value="3">⭐⭐⭐ Average</option>
                        <option value="2">⭐⭐ Poor</option>
                        <option value="1">⭐ Very Poor</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Feedback (optional)</label>
                    <textarea name="feedback" class="form-control" rows="3"></textarea>
                </div>
                <div class="d-grid gap-2">
                    <button name="action" value="approve" class="btn btn-success">✅ Approve Work</button>
                    <button name="action" value="reject" class="btn btn-outline-danger">❌ Reject / Request Redo</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
