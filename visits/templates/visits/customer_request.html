{% extends 'base.html' %}

{% block title %}Request Service - FieldCRM{% endblock %}
{% block page_title %}Request a Service{% endblock %}
{% block page_subtitle %}Describe your problem and we'll assign a worker{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-600">Service Category</label>
                        <select name="category" class="form-select" required>
                            <option value="ac_repair">AC Repair</option>
                            <option value="electrical">Electrical</option>
                            <option value="plumbing">Plumbing</option>
                            <option value="carpentry">Carpentry</option>
                            <option value="painting">Painting</option>
                            <option value="general" selected>General Service</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-600">Describe your problem</label>
                        <textarea name="problem_description" class="form-control" rows="4"
                                  placeholder="e.g. Fan is not working in the hall" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-600">Site Address</label>
                        <input type="text" name="site_address" class="form-control"
                               placeholder="Your address" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-600">Phone Number</label>
                        <input type="text" name="customer_phone" class="form-control"
                               placeholder="Contact number">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-600">Upload a Photo (optional)</label>
                        <input type="file" name="before_photo" class="form-control" accept="image/*">
                    </div>

                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-send"></i> Submit Request
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
