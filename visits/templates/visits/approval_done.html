<!DOCTYPE html>
<html>
<head><title>Done - FieldCRM</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5 text-center" style="max-width:400px;">
    <div class="card shadow-sm p-4">
        {% if visit.status == 'approved' %}
            <h2>✅</h2>
            <h5 class="fw-bold">Work Approved!</h5>
            <p class="text-muted">Thank you for your feedback.</p>
        {% else %}
            <h2>❌</h2>
            <h5 class="fw-bold">Feedback Recorded</h5>
            <p class="text-muted">Our team will follow up with you shortly.</p>
        {% endif %}
    </div>
</div>
</body>
</html>
